<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shape -->
  <rect width="512" height="512" rx="100" fill="url(#grad1)" stroke="#6B88D3" stroke-width="16"/>
  
  <!-- Robot Head Group -->
  <g transform="translate(256, 230)">
    <!-- Antenna -->
    <line x1="0" y1="-150" x2="0" y2="-200" stroke="#9CA3AF" stroke-width="12" stroke-linecap="round"/>
    <circle cx="0" cy="-200" r="18" fill="#EF4444" stroke="#7F1D1D" stroke-width="4"/>

    <!-- Head Shape -->
    <rect x="-140" y="-150" width="280" height="220" rx="40" fill="#4B5563" stroke="#6B88D3" stroke-width="8"/>
    
    <!-- Screen Area -->
    <rect x="-110" y="-120" width="220" height="140" rx="20" fill="#000" stroke="#1F2937" stroke-width="4"/>
    
    <!-- Glowing Eyes -->
    <circle cx="-55" cy="-60" r="30" fill="#EFEFBB" filter="url(#glow)"/>
    <circle cx="55" cy="-60" r="30" fill="#EFEFBB" filter="url(#glow)"/>
    
    <!-- Mouth Grill -->
    <g transform="translate(0, 0)">
       <rect x="-45" y="40" width="10" height="20" rx="2" fill="#6B88D3"/>
       <rect x="-20" y="40" width="10" height="20" rx="2" fill="#6B88D3"/>
       <rect x="5" y="40" width="10" height="20" rx="2" fill="#6B88D3"/>
       <rect x="30" y="40" width="10" height="20" rx="2" fill="#6B88D3"/>
    </g>
  </g>
  
  <!-- Text Label -->
  <text x="256" y="420" font-family="monospace" font-weight="900" font-size="70" fill="#EFEFBB" text-anchor="middle" letter-spacing="6" filter="url(#glow)">CALC</text>
</svg>